name: Keep BigRocks Alive

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Streamlit App
        run: |
          curl \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            -H "Accept: text/html" \
            -H "Cache-Control: no-cache" \
            -s \
            https://bigrocks.streamlit.app \
            > page.html

          wc -c page.html
