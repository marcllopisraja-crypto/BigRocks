name: Keep BigRocks Alive

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wake App
        run: |
          curl \
          -A "Mozilla/5.0" \
          -L \
          https://bigrocks.streamlit.app \
          > /dev/null
